<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Task</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f6f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #111827;
        }

        .view-card {
            width: 460px;
            background: #ffffff;
            padding: 36px 34px;
            border-radius: 22px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.12);
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .detail {
            margin-bottom: 14px;
            font-size: 15px;
            color: #374151;
            line-height: 1.5;
        }

        .detail b {
            color: #111827;
        }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            margin-left: 6px;
            background: #e5e7eb;
            color: #111827;
        }

        .actions {
            margin-top: 26px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .actions a {
            padding: 10px 22px;
            border-radius: 999px;
            background: #111827;
            color: white;
            font-weight: 700;
            text-decoration: none;
            font-size: 14px;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        .actions a.secondary {
            background: #e5e7eb;
            color: #111827;
        }

        .actions a:hover {
            transform: translateY(-2px);
            background: #374151;
        }

        .actions a.secondary:hover {
            background: #d1d5db;
        }
    </style>
</head>

<body>

<div class="view-card">

    <h2 th:text="${task.title}"></h2>

    <div class="detail">
        <b>Description:</b>
        <span th:text="${task.description}"></span>
    </div>

    <div class="detail">
        <b>Due date:</b>
        <span th:text="${task.dueDate}"></span>
    </div>

    <div class="detail">
        <b>Status:</b>
        <span class="badge" th:text="${task.status}"></span>
    </div>

    <div class="detail">
        <b>Priority:</b>
        <span class="badge" th:text="${task.priority}"></span>
    </div>

    <div class="detail">
        <b>Created at:</b>
        <span th:text="${#temporals.format(task.createdAt,'dd-MM-yyyy HH:mm')}"></span>
    </div>

    <div class="detail" th:if="${task.completedAt != null}">
        <b>Completed at:</b>
        <span th:text="${#temporals.format(task.completedAt,'dd-MM-yyyy HH:mm')}"></span>
    </div>

    <div class="actions">
        <a href="/tasks">Back to Tasks</a>
        <a th:href="@{'/tasks/edit/' + ${task.id}}"
           th:if="${task.status.name() != 'COMPLETED'}"
           class="secondary">
            Edit Task
        </a>
    </div>

</div>

</body>
</html>
