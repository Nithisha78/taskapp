<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Task Reminder App</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f6f7f9;   /* same background as tasks page */
            display: flex;
            justify-content: center;
            align-items: center;
            color: #111827;
        }

        .card {
            background: #ffffff;
            padding: 50px 45px;
            border-radius: 22px;
            text-align: center;
            width: 420px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.12);
        }

        h1 {
            font-size: 32px;
            margin-bottom: 12px;
            font-weight: 800;
            letter-spacing: -0.4px;
        }

        p {
            margin-bottom: 32px;
            color: #4b5563;
            font-size: 15px;
        }

        a.button {
            display: block;
            margin: 14px 0;
            padding: 14px;
            border-radius: 999px;   /* Pinterest pill style */
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            background: #111827;
            color: white;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        a.button:hover {
            background: #374151;
            transform: translateY(-2px);
        }

        a.button.secondary {
            background: #e5e7eb;
            color: #111827;
        }

        a.button.secondary:hover {
            background: #d1d5db;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Task Reminder</h1>
    <p>Organize, track, and complete your tasks efficiently</p>

    <a href="/tasks" class="button">View Tasks</a>
    <a href="/tasks/form" class="button secondary">Add Task</a>
</div>

</body>
</html>
