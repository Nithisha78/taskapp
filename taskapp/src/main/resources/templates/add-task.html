<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Task</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f6f7f9;            /* same as tasks page */
            display: flex;
            justify-content: center;
            align-items: center;
            color: #111827;
        }

        .form-card {
            width: 440px;
            background: #ffffff;
            padding: 36px 34px;
            border-radius: 22px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.12);
        }

        h2 {
            text-align: center;
            margin-bottom: 26px;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        label {
            font-weight: 700;
            display: block;
            margin-bottom: 6px;
            margin-top: 14px;
            font-size: 14px;
            color: #374151;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            margin-bottom: 8px;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #111827;
            box-shadow: 0 0 0 2px rgba(17,24,39,0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 22px;
            background: #111827;
            border: none;
            border-radius: 999px;
            font-weight: 800;
            font-size: 15px;
            color: white;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        button:hover {
            background: #374151;
            transform: translateY(-2px);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 22px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            color: #374151;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="form-card">
    <h2>Add Task</h2>

    <form action="/tasks/add" method="post" th:object="${task}">
        <label>Title</label>
        <input type="text" th:field="*{title}" required>

        <label>Description</label>
        <textarea th:field="*{description}" rows="3" required></textarea>

        <label>Due Date</label>
        <input type="date" th:field="*{dueDate}" required>

        <label>Priority</label>
        <select th:field="*{priority}" required>
            <option th:each="p : ${priorities}"
                    th:value="${p}"
                    th:text="${p}">
            </option>
        </select>

        <button type="submit">Add Task</button>
    </form>

    <a href="/tasks" class="back-link">← Back to Tasks</a>
</div>

</body>
</html>
